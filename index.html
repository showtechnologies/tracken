<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracken v2.1 - Gestione Attrezzature</title>
  <style>
    :root{
      --bg:#f4f7fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --border:#dbe3ee;
      --primary:#1d4ed8; --primary-soft:#dbeafe; --ok:#166534; --ok-soft:#dcfce7;
      --warn:#92400e; --warn-soft:#fef3c7; --danger:#b91c1c; --danger-soft:#fee2e2; --info:#0f766e; --info-soft:#ccfbf1;
      --shadow:0 10px 30px rgba(15,23,42,.08); --r:16px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit}
    .app{max-width:1280px;margin:0 auto;padding:12px;padding-bottom:96px}
    .panel,.sidebar,.modal-card,.sticky-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
    .panel,.sidebar,.sticky-bar{padding:14px}
    .layout{display:grid;grid-template-columns:260px 1fr;gap:14px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .top h1,.top h2,.top h3{margin:0}
    .top p,.muted{color:var(--muted)}
    .small{font-size:.84rem}
    .actions{display:flex;flex-wrap:wrap;gap:8px}
    .grid{display:grid;gap:12px}
    .g2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .g3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .g4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .grow{flex:1}
    button{border:1px solid var(--border);background:#fff;padding:11px 12px;border-radius:12px;cursor:pointer;min-height:44px}
    button:hover{transform:translateY(-1px)}
    .primary{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700}
    .ok{background:var(--ok-soft);border-color:#bbf7d0;color:var(--ok);font-weight:700}
    .warn{background:var(--warn-soft);border-color:#fde68a;color:var(--warn);font-weight:700}
    .danger{background:var(--danger-soft);border-color:#fecaca;color:var(--danger);font-weight:700}
    .soft{background:var(--primary-soft);border-color:#bfdbfe;color:var(--primary);font-weight:700}
    .info{background:var(--info-soft);border-color:#99f6e4;color:var(--info);font-weight:700}
    label{display:flex;flex-direction:column;gap:6px;font-weight:600;font-size:.92rem}
    input,select,textarea{width:100%;padding:11px;border:1px solid var(--border);border-radius:12px;background:#fff}
    textarea{min-height:96px;resize:vertical}
    .tilegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
    .tile{padding:14px;border:1px solid var(--border);border-radius:14px;background:#fff;cursor:pointer;text-align:left}
    .tile:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
    .badge,.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:.8rem;font-weight:700}
    .badge{background:var(--primary-soft);color:var(--primary)}
    .pill.home{background:var(--ok-soft);color:var(--ok)}
    .pill.incarico{background:var(--warn-soft);color:var(--warn)}
    .pill.mine{background:var(--primary-soft);color:var(--primary)}
    .pill.offline{background:var(--danger-soft);color:var(--danger)}
    .pill.sync{background:var(--info-soft);color:var(--info)}
    .pill.cantiere{background:#e0f2fe;color:#0369a1}
    .pill.magazzino{background:#ede9fe;color:#6d28d9}
    .article-list,.owned-list,.result-list{display:flex;flex-direction:column;gap:10px}
    .article,.owned-card,.result-card{border:1px solid var(--border);border-radius:14px;background:#fff;padding:12px}
    .article{display:grid;grid-template-columns:34px 1.5fr 1fr 1fr 1fr auto;gap:10px;align-items:center}
    .article.selected{border-color:#93c5fd;background:#f8fbff}
    .alert{display:none;padding:12px 14px;border-radius:12px;margin-bottom:12px}
    .alert.show{display:block}
    .alert.ok{background:var(--ok-soft);color:var(--ok);border:1px solid #bbf7d0}
    .alert.error{background:var(--danger-soft);color:var(--danger);border:1px solid #fecaca}
    .alert.info{background:var(--info-soft);color:var(--info);border:1px solid #99f6e4}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:12px;z-index:1000}
    .modal.open{display:flex}
    .modal-card{width:min(860px,100%);max-height:92vh;overflow:auto;padding:18px}
    .modal-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-top:14px}
    .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
    .pinpad button{font-weight:800}
    .sidebar .nav{display:flex;flex-direction:column;gap:8px}
    .sidebar .nav button.active{background:var(--primary-soft);color:var(--primary);border-color:#bfdbfe;font-weight:700}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:10px;border-bottom:1px solid var(--border);vertical-align:top}
    th{font-size:.8rem;text-transform:uppercase;color:var(--muted)}
    .sticky-bar{position:fixed;left:10px;right:10px;bottom:10px;z-index:900}
    .sticky-bar .actions{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .preview-img{max-width:100%;border-radius:12px;border:1px solid var(--border)}
    .syncbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .empty{padding:16px;border:1px dashed var(--border);border-radius:14px;background:#fff}
    .stats{display:grid;gap:12px;grid-template-columns:repeat(4,minmax(0,1fr))}
    .stat{border:1px solid var(--border);border-radius:14px;padding:14px;background:linear-gradient(180deg,#fff,#f8fbff)}
    .stat .value{font-size:1.6rem;font-weight:800;margin-top:6px}
    @media(max-width:980px){
      .layout{grid-template-columns:1fr}
      .g4,.g3,.stats{grid-template-columns:repeat(2,minmax(0,1fr))}
      .article{grid-template-columns:34px 1fr 1fr}
      .article>:last-child{grid-column:2/-1}
    }
    @media(max-width:720px){
      .app{padding:10px;padding-bottom:110px}
      .g2,.g3,.g4,.stats{grid-template-columns:1fr}
      .actions,.modal-actions{flex-direction:column}
      .actions button,.modal-actions button{width:100%}
      .sticky-bar{left:8px;right:8px;bottom:8px;padding:10px}
      .sticky-bar .actions{grid-template-columns:repeat(2,minmax(0,1fr))}
      .article{grid-template-columns:28px 1fr}
      .article>div,.article>button{grid-column:2}
      .panel,.sidebar,.sticky-bar{padding:12px}
      table,thead,tbody,tr,th,td{display:block}
      thead{display:none}
      table{border-collapse:separate;border-spacing:0 8px}
      tbody tr{background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px;box-shadow:var(--shadow)}
      td{border:0;padding:5px 2px}
      td::before{content:attr(data-label);display:block;font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:3px}
    }
  </style>
</head>
<body>
<div class="app" id="app"></div>
<div class="modal" id="modal"><div class="modal-card" id="modalCard"></div></div>
<script>
const ADMIN_USER="admin", ADMIN_PASSWORD="admin123", SESSION_TIMEOUT_MINUTES=20;
let GITHUB_TOKEN = localStorage.getItem("tracken_github_token") || "";
const GITHUB_OWNER="showtechnologies";
const GITHUB_REPO="tracken";
const GITHUB_FILE="database.json";
const GITHUB_BRANCH="main";
const QUEUE_KEY="tracken_pending_snapshot_v21";
const TAB_SYNC_KEY="tracken_tab_sync_v21";
const POLL_MS=5000;
const tabChannel = ("BroadcastChannel" in window) ? new BroadcastChannel("tracken_sync_channel_v21") : null;

let db=null, currentUserId=null, currentLocationId=null, adminLogged=false, currentView="home", selectedArticleIds=[], lastActivityAt=null, currentSessionId=null, alertState=null, currentSHA=null;
let syncState="idle";
let modalImageData=null;
let globalSearchTerm="";
let locationSearchTerm="";
let focusState=null;
const $=s=>document.querySelector(s);

function uid(p='id'){ return `${p}_${Math.random().toString(36).slice(2,10)}_${Date.now().toString(36)}` }
function nowIso(){ return new Date().toISOString() }
function formatDate(iso){ return iso ? new Date(iso).toLocaleString('it-IT') : '-' }
function esc(v){ return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;') }
function hashPin(pin){ return btoa(`pin:${pin}:v1`) }
function utf8ToBase64(str){ return btoa(unescape(encodeURIComponent(str))); }
function base64ToUtf8(str){ return decodeURIComponent(escape(atob(str))); }

function hasToken(){ return !!(GITHUB_TOKEN && GITHUB_TOKEN.trim()); }
function isGitHubConfigured(){ return hasToken() && !!GITHUB_OWNER && !!GITHUB_REPO && !!GITHUB_FILE && !!GITHUB_BRANCH; }
function pendingSnapshot(){ try { return JSON.parse(localStorage.getItem(QUEUE_KEY)||"null"); } catch(e){ return null; } }
function hasPendingSync(){ return !!pendingSnapshot(); }

function saveToken(){
  const token = document.getElementById("tokenInput")?.value?.trim() || "";
  if(!token){ alert("Inserisci il token GitHub."); return; }
  localStorage.setItem("tracken_github_token", token);
  GITHUB_TOKEN = token;
  currentSHA = null;
  loadFromGitHub(true).catch(console.error);
}
function resetToken(){
  if(!confirm("Vuoi rimuovere il token salvato da questo dispositivo?")) return;
  localStorage.removeItem("tracken_github_token");
  GITHUB_TOKEN=""; currentSHA=null; db=null; adminLogged=false; currentUserId=null; currentLocationId=null;
  render();
}
function renderTokenSetup(){
  document.getElementById("app").innerHTML = `
  <div class="panel">
    <div id="topAlertSlot">${renderAlert()}</div>
    ${renderTopbar('Tracken - Configurazione iniziale','Inserisci il token GitHub una sola volta su questo dispositivo')}
    <div class="panel" style="margin:0">
      <h3>Token GitHub</h3>
      <p class="small muted">Il token verrà salvato solo in questo browser.</p>
      <label>Token GitHub
        <input id="tokenInput" type="password" placeholder="github_pat_..." autocomplete="off" autocapitalize="off" spellcheck="false">
      </label>
      <div class="actions" style="margin-top:12px">
        <button class="primary" onclick="saveToken()">Salva token e collega GitHub</button>
      </div>
    </div>
  </div>`;
}

function showAlert(type,msg){
  alertState={type,message:msg};
  renderAlertOnly();
  setTimeout(()=>{
    alertState=null;
    renderAlertOnly();
  },2500);
}
function renderAlert(){ return !alertState?'':`<div class="alert show ${alertState.type}">${esc(alertState.message)}</div>` }
function renderAlertOnly(){
  const slot = document.getElementById("topAlertSlot");
  if(slot) slot.innerHTML = renderAlert();
}
function touchSession(){ lastActivityAt=nowIso() }
function sessionExpired(){ if(!lastActivityAt) return false; return (Date.now()-new Date(lastActivityAt).getTime())>SESSION_TIMEOUT_MINUTES*60*1000 }
function logoutAll(){ currentUserId=null; currentLocationId=null; adminLogged=false; currentView='home'; selectedArticleIds=[]; currentSessionId=null; lastActivityAt=null; render() }
function ensureSession(){ if(sessionExpired()) logoutAll() }

function getUserName(id){ const u=db?.users?.find(x=>x.id===id); return u ? u.name : "-" }
function getLocationName(id){ const l=db?.locations?.find(x=>x.id===id); return l ? l.name : "-" }
function activeUsers(){ return db?.users?.filter(u=>u.active && u.role==='user') || [] }
function activeLocations(){ return db?.locations?.filter(l=>l.active) || [] }
function activeArticlesForLocation(id){ return db?.articles?.filter(a=>a.active && a.locationId===id) || [] }
function findArticle(id){ return db?.articles?.find(a=>a.id===id) }
function isMine(a){ return !!currentUserId && a.currentHolderUserId === currentUserId; }
function statePill(a){
  const main = a.state==='home' ? `<span class="pill home">↓ Home</span>` : `<span class="pill incarico">↑ In carico</span>`;
  const mine = isMine(a) ? `<span class="pill mine">Lo hai tu</span>` : ``;
  return main + (mine ? ` ${mine}` : '');
}

function getSearchResults(q){
  const needle=(q||"").trim().toLowerCase();
  if(!needle || !db) return [];
  return db.articles.filter(a=>{
    const holder = getUserName(a.currentHolderUserId);
    const loc = getLocationName(a.locationId);
    return `${a.name} ${a.category||''} ${a.serial||''} ${a.internalCode||''} ${holder} ${loc} ${a.lastNote||''}`.toLowerCase().includes(needle);
  }).slice(0,50);
}
function getOwnedArticles(){ return db?.articles?.filter(a=>a.active && a.currentHolderUserId===currentUserId) || []; }

function movementLabel(type){ return {prelievo:'Prelievo',restituzione:'Restituzione',passaggio:'Passaggio',trasferimento:'Trasferimento'}[type] || type; }
function renderSyncBadge(){
  const map = {
    idle:`<span class="pill sync">Sincronizzato</span>`,
    syncing:`<span class="pill sync">Salvataggio in corso</span>`,
    offline:`<span class="pill offline">Offline / in coda${hasPendingSync()?' (1+)':''}</span>`,
    error:`<span class="pill offline">Errore sync</span>`
  };
  return map[syncState] || map.idle;
}

function broadcastLocalUpdate(){
  const payload = { type:"db-updated", sha: currentSHA, db, syncState, ts: Date.now() };
  if(tabChannel) tabChannel.postMessage(payload);
  localStorage.setItem(TAB_SYNC_KEY, JSON.stringify(payload));
}
function applyRemoteTabUpdate(payload){
  if(!payload || payload.type!=="db-updated" || !payload.db) return;
  db = payload.db;
  if(payload.sha) currentSHA = payload.sha;
  syncState = payload.syncState || (hasPendingSync() ? "offline" : "idle");
  render();
}

async function loadFromGitHub(show=true){
  if(!isGitHubConfigured()){
    if(show) showAlert('error','Token GitHub mancante o configurazione incompleta.');
    render(); return false;
  }
  try{
    syncState = navigator.onLine ? "syncing" : "offline";
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}?ref=${GITHUB_BRANCH}`;
    const res = await fetch(url,{ headers:{ Authorization:`Bearer ${GITHUB_TOKEN}`, Accept:'application/vnd.github+json' } });
    const raw = await res.text();
    console.log("LOAD STATUS:", res.status, raw);
    if(!res.ok){
      syncState = "error";
      if(show) showAlert('error', `Errore GitHub ${res.status}. Apri la console.`);
      render(); return false;
    }
    const data = JSON.parse(raw);
    currentSHA = data.sha;
    db = JSON.parse(base64ToUtf8((data.content||"").replace(/\\n/g,'')));
    syncState = hasPendingSync() ? "offline" : "idle";
    broadcastLocalUpdate();
    if(show) showAlert('ok','database.json caricato da GitHub.');
    render();
    await syncPendingIfNeeded();
    return true;
  }catch(err){
    console.error("LOAD EXCEPTION:", err);
    syncState = navigator.onLine ? "error" : "offline";
    if(show) showAlert('error','Errore caricamento GitHub.');
    render();
    return false;
  }
}

function queueSnapshot(){
  localStorage.setItem(QUEUE_KEY, JSON.stringify({ db, queuedAt: nowIso() }));
  syncState = "offline";
  broadcastLocalUpdate();
  render();
}
function clearQueuedSnapshot(){ localStorage.removeItem(QUEUE_KEY); }

async function syncPendingIfNeeded(){
  const pending = pendingSnapshot();
  if(!pending || !navigator.onLine || !isGitHubConfigured()) return false;
  db = pending.db;
  if(!currentSHA){
    const ok = await loadFromGitHub(false);
    if(!ok) return false;
  }
  const ok = await saveJsonFile(false, true);
  if(ok){
    clearQueuedSnapshot();
    syncState="idle";
    showAlert('ok','Modifiche offline sincronizzate.');
    render();
    return true;
  }
  return false;
}

async function saveJsonFile(show=true, fromQueue=false){
  if(!db){ if(show) showAlert('error','Database non caricato.'); render(); return false; }
  if(!currentSHA){ if(show) showAlert('error','Carica prima database.json da GitHub.'); render(); return false; }
  if(!isGitHubConfigured()){ if(show) showAlert('error','Token GitHub mancante.'); render(); return false; }
  if(!navigator.onLine){
    queueSnapshot();
    if(show) showAlert('info','Sei offline: modifiche messe in coda.');
    return false;
  }
  try{
    syncState="syncing"; render();
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    let res = await fetch(url,{
      method:'PUT',
      headers:{ Authorization:`Bearer ${GITHUB_TOKEN}`, Accept:'application/vnd.github+json' },
      body: JSON.stringify({ message:'update database', content:utf8ToBase64(JSON.stringify(db,null,2)), sha: currentSHA, branch: GITHUB_BRANCH })
    });

    if(res.status===409 || res.status===422){
      const pendingDb = JSON.parse(JSON.stringify(db));
      const reloadOk = await loadFromGitHub(false);
      if(!reloadOk) throw new Error('Conflitto SHA');
      db = pendingDb;
      res = await fetch(url,{
        method:'PUT',
        headers:{ Authorization:`Bearer ${GITHUB_TOKEN}`, Accept:'application/vnd.github+json' },
        body: JSON.stringify({ message:'update database', content:utf8ToBase64(JSON.stringify(db,null,2)), sha: currentSHA, branch: GITHUB_BRANCH })
      });
    }
    const raw = await res.text();
    console.log("SAVE STATUS:", res.status, raw);
    if(!res.ok) throw new Error(raw || 'Errore salvataggio GitHub');
    const data = JSON.parse(raw);
    currentSHA = data.content.sha;
    if(fromQueue) clearQueuedSnapshot();
    syncState = hasPendingSync() ? "offline" : "idle";
    broadcastLocalUpdate();
    if(show) showAlert('ok','Salvato automaticamente su GitHub.');
    return true;
  }catch(err){
    console.error("SAVE EXCEPTION:", err);
    queueSnapshot();
    if(show) showAlert('info','Salvataggio non riuscito: modifiche messe in coda.');
    return false;
  }finally{
    if(syncState==="syncing") syncState="idle";
    render();
  }
}

async function compressImageFile(file, maxSide=1200, quality=0.7){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e=>{
      img.onload = ()=>{
        let {width,height}=img;
        const ratio = Math.min(1, maxSide / Math.max(width,height));
        const w = Math.round(width*ratio), h = Math.round(height*ratio);
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function handleMovementImageChange(e){
  const file = e.target.files?.[0];
  if(!file){ modalImageData=null; const p=document.getElementById("imgPreviewWrap"); if(p) p.innerHTML=""; return; }
  const data = await compressImageFile(file);
  modalImageData = data;
  const p=document.getElementById("imgPreviewWrap");
  if(p) p.innerHTML = `<img class="preview-img" src="${data}" alt="preview">`;
}

function renderTopbar(title,subtitle,extra=''){ return `<div class="top"><div><h1>${esc(title)}</h1><p>${esc(subtitle)}</p></div><div class="actions">${extra}</div></div>` }
function restoreFocus(){
  if(!focusState) return;
  const el = document.getElementById(focusState.id);
  if(!el) return;
  const pos = Math.min(focusState.caret ?? el.value.length, el.value.length);
  requestAnimationFrame(() => {
    el.focus();
    try{ el.setSelectionRange(pos, pos); }catch(e){}
  });
}

function renderGlobalSearchResults(){
  const items = getSearchResults(globalSearchTerm);
  return `<div class="result-list" style="margin-top:12px">${items.length ? items.map(a=>`
    <button class="result-card" type="button" onclick="openHistory('${a.id}')" style="text-align:left; width:100%;">
      <strong>${esc(a.name)}</strong> ${a.serial?`<span class="badge">${esc(a.serial)}</span>`:''}
      <div class="small muted" style="margin-top:6px">Sede: ${esc(getLocationName(a.locationId))} • Possessore: ${esc(a.currentHolderUserId?getUserName(a.currentHolderUserId):'Home')}</div>
      <div style="margin-top:8px">${statePill(a)}</div>
      <div class="small muted" style="margin-top:8px">Ultimo movimento: ${formatDate(a.lastMovementAt)}</div>
      <div class="small" style="margin-top:8px;color:#1d4ed8;font-weight:700">Apri storico movimentazioni</div>
    </button>`).join('') : `<div class="empty">Nessun risultato.</div>`}</div>`;
}
function renderGlobalSearchBox(){
  return `<label class="grow">Cerca oggetto, seriale, utente o cantiere<input id="globalSearch" placeholder="Es. trapano, SN7781, Recco..." value="${esc(globalSearchTerm)}" oninput="setGlobalSearch(this.value, this.selectionStart)"></label>`;
}
function setGlobalSearch(v, caret=null){
  globalSearchTerm = v;
  focusState = { id:'globalSearch', caret: caret ?? v.length };
  render();
}
function setLocationSearch(v, caret=null){
  locationSearchTerm = v;
  focusState = { id:'searchArticles', caret: caret ?? v.length };
  render();
}

function render(){
  ensureSession();
  if(!hasToken()){ renderTokenSetup(); return; }
  const app=$('#app');
  if(!db){
    app.innerHTML = `<div class="panel"><div id="topAlertSlot">${renderAlert()}</div>${renderTopbar('Tracken - GitHub','Collega l’app al database online', renderSyncBadge()+` <button onclick="resetToken()">Cambia token</button>`)}<div class="actions"><button class="primary" onclick="loadFromGitHub()">Carica database da GitHub</button></div><p class="small muted" style="margin-top:12px">Dopo il primo caricamento, lettura e salvataggio saranno automatici.</p></div>`;
    restoreFocus();
    return;
  }

  const searchBox = renderGlobalSearchBox();
  const results = globalSearchTerm ? renderGlobalSearchResults() : '';

  if(adminLogged){
    const body = currentView==='admin_users' ? renderAdminUsers()
      : currentView==='admin_locations' ? renderAdminLocations()
      : currentView==='admin_articles' ? renderAdminArticles()
      : currentView==='admin_logs' ? renderAdminLogs()
      : renderAdminDashboard();
    app.innerHTML = `<div class="layout">${renderAdminSidebar()}<div><div id="topAlertSlot">${renderAlert()}</div><div class="panel" style="margin-bottom:12px">${renderTopbar('Ricerca globale','Admin e operatori possono localizzare rapidamente un articolo', renderSyncBadge())}${searchBox}${results}</div>${body}</div></div>`;
    restoreFocus();
    return;
  }

  if(!currentUserId){
    app.innerHTML = `<div id="topAlertSlot">${renderAlert()}</div>${renderHome(searchBox, results)}`;
    restoreFocus();
    return;
  }
  if(!currentLocationId){
    app.innerHTML = `<div id="topAlertSlot">${renderAlert()}</div>${renderUserLanding(searchBox, results)}`;
    restoreFocus();
    return;
  }

async function confirmMovement(type){
  const note=$('#movementNote').value.trim(), targetUser=$('#targetUser')?.value||null, targetLocation=$('#targetLocation')?.value||null, articles=selectedArticleIds.map(findArticle).filter(Boolean);
  if(type==='passaggio'&&!targetUser){ showAlert('error','Seleziona il collega destinatario.'); closeModal(); return; }
  if(type==='trasferimento'&&!targetLocation){ showAlert('error','Seleziona la sede di destinazione.'); closeModal(); return; }
  for(const a of articles){
    if(type==='prelievo' && a.state!=='home'){ showAlert('error',`L'articolo ${a.name} non è in home.`); closeModal(); return; }
    if(type==='restituzione' && a.state!=='in_carico'){ showAlert('error',`L'articolo ${a.name} risulta già in home.`); closeModal(); return; }
    if(type==='passaggio' && a.state!=='in_carico'){ showAlert('error',`L'articolo ${a.name} deve essere in carico per il passaggio.`); closeModal(); return; }
    if(type==='trasferimento' && a.state!=='home'){ showAlert('error',`L'articolo ${a.name} può essere trasferito solo quando è in home.`); closeModal(); return; }
  }
  for(const a of articles){
    const movement = {
      id:uid('mov'), timestamp:nowIso(), movementType:type, articleId:a.id, articleName:a.name, articleSerial:a.serial||'',
      fromLocationId:a.locationId,
      toLocationId:type==='trasferimento' ? targetLocation : a.locationId,
      fromUserId:type==='prelievo' ? null : a.currentHolderUserId,
      toUserId:type==='prelievo' ? currentUserId : type==='passaggio' ? targetUser : null,
      recordedByUserId:currentUserId, note:note||'', imageData:modalImageData||null, sessionId: currentSessionId || uid('sess')
    };
    db.movements.unshift(movement);
    if(type==='prelievo'){ a.state='in_carico'; a.currentHolderUserId=currentUserId; a.lastKnownUserId=currentUserId; }
    if(type==='restituzione'){ a.state='home'; a.currentHolderUserId=null; }
    if(type==='passaggio'){ a.state='in_carico'; a.currentHolderUserId=targetUser; a.lastKnownUserId=targetUser; }
    if(type==='trasferimento'){ a.locationId=targetLocation; a.state='home'; a.currentHolderUserId=null; }
    a.lastMovementAt=movement.timestamp; a.lastNote=note||'';
  }
  selectedArticleIds=[]; closeModal(); await saveJsonFile(); render();
}

function openHistory(articleId){
  const article=findArticle(articleId), logs=db.movements.filter(m=>m.articleId===articleId);
  openModal(`<h3>Storico articolo</h3><p><strong>${esc(article.name)}</strong> ${article.serial?`• ${esc(article.serial)}`:''}</p>
    ${logs.length ? `<table><thead><tr><th>Data</th><th>Tipo</th><th>Da sede</th><th>A sede</th><th>Da</th><th>A</th><th>Registrato da</th><th>Nota</th><th>Img</th></tr></thead><tbody>

      ${db.movements.map(m=>`<tr><td data-label="Data">${formatDate(m.timestamp)}</td><td data-label="Tipo">${esc(movementLabel(m.movementType))}</td><td data-label="Articolo">${esc(m.articleName)}</td><td data-label="Seriale">${esc(m.articleSerial||'-')}</td><td data-label="Da sede">${esc(getLocationName(m.fromLocationId))}</td><td data-label="A sede">${esc(getLocationName(m.toLocationId))}</td><td data-label="Da user">${esc(m.fromUserId?getUserName(m.fromUserId):'Home')}</td><td data-label="A user">${esc(m.toUserId?getUserName(m.toUserId):'Home')}</td><td data-label="Registrato da">${esc(m.recordedByUserId?getUserName(m.recordedByUserId):'-')}</td><td data-label="Nota">${esc(m.note||'-')}</td></tr>`).join('')}
    </tbody></table>
  </div>`;
}

function pollForRemoteChanges(){
  if(!hasToken() || !db || document.hidden || !navigator.onLine) return;
  const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}?ref=${GITHUB_BRANCH}`;
  fetch(url,{ headers:{ Authorization:`Bearer ${GITHUB_TOKEN}`, Accept:'application/vnd.github+json' } })
    .then(res => res.ok ? res.json() : null)
    .then(data => {
      if(!data) return;
      if(currentSHA && data.sha !== currentSHA){
        currentSHA = data.sha;
        db = JSON.parse(base64ToUtf8((data.content || "").replace(/\\n/g,'')));
        syncState = hasPendingSync() ? "offline" : "idle";
        broadcastLocalUpdate();
        render();
      }
    }).catch(err => console.error("POLL ERROR:", err));
}

window.saveToken=saveToken; window.resetToken=resetToken; window.loadFromGitHub=loadFromGitHub; window.saveJsonFile=saveJsonFile; window.pinKey=pinKey; window.adminLogin=adminLogin; window.openPinModal=openPinModal; window.userLogin=userLogin; window.selectLocation=selectLocation; window.toggleArticle=toggleArticle; window.openMovementModal=openMovementModal; window.confirmMovement=confirmMovement; window.openHistory=openHistory; window.closeModal=closeModal; window.setAdminView=setAdminView; window.createUser=createUser; window.resetPin=resetPin; window.deleteUser=deleteUser; window.createLocation=createLocation; window.deleteLocation=deleteLocation; window.createArticle=createArticle; window.deleteArticle=deleteArticle; window.logoutAll=logoutAll; window.exportLocationPdf=exportLocationPdf; window.handleMovementImageChange=handleMovementImageChange; window.setGlobalSearch=setGlobalSearch; window.setLocationSearch=setLocationSearch;

if(tabChannel){
  tabChannel.onmessage = (event) => applyRemoteTabUpdate(event.data);
}
window.addEventListener("storage", (event) => {
  if(event.key === TAB_SYNC_KEY && event.newValue){
    try { applyRemoteTabUpdate(JSON.parse(event.newValue)); } catch(err){ console.error("STORAGE SYNC ERROR:", err); }
  }
});
window.addEventListener('online', ()=>{ syncPendingIfNeeded(); loadFromGitHub(false); });
window.addEventListener('visibilitychange', ()=>{ if(!document.hidden && hasToken()) loadFromGitHub(false); });
setInterval(pollForRemoteChanges, POLL_MS);

if(hasToken()){ loadFromGitHub(false).then(ok=>{ if(!ok) render(); }); } else { renderTokenSetup(); }
</script>
</body>
</html>
