
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracken Supabase v1</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f4f7fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --border:#dbe3ee;
      --primary:#1d4ed8; --primary-soft:#dbeafe; --ok:#166534; --ok-soft:#dcfce7;
      --warn:#92400e; --warn-soft:#fef3c7; --danger:#b91c1c; --danger-soft:#fee2e2; --info:#0f766e; --info-soft:#ccfbf1;
      --shadow:0 10px 30px rgba(15,23,42,.08); --r:16px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit}
    .app{max-width:1280px;margin:0 auto;padding:12px;padding-bottom:96px}
    .panel,.sidebar,.modal-card,.sticky-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
    .panel,.sidebar,.sticky-bar{padding:14px}
    .layout{display:grid;grid-template-columns:260px 1fr;gap:14px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .top h1,.top h2,.top h3{margin:0}
    .top p,.muted{color:var(--muted)} .small{font-size:.84rem}
    .actions{display:flex;flex-wrap:wrap;gap:8px} .grow{flex:1}
    .grid{display:grid;gap:12px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}
    button{border:1px solid var(--border);background:#fff;padding:11px 12px;border-radius:12px;cursor:pointer;min-height:44px}
    button:hover{transform:translateY(-1px)}
    .primary{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700}
    .ok{background:var(--ok-soft);border-color:#bbf7d0;color:var(--ok);font-weight:700}
    .warn{background:var(--warn-soft);border-color:#fde68a;color:var(--warn);font-weight:700}
    .danger{background:var(--danger-soft);border-color:#fecaca;color:var(--danger);font-weight:700}
    .soft{background:var(--primary-soft);border-color:#bfdbfe;color:var(--primary);font-weight:700}
    .info{background:var(--info-soft);border-color:#99f6e4;color:var(--info);font-weight:700}
    label{display:flex;flex-direction:column;gap:6px;font-weight:600;font-size:.92rem}
    input,select,textarea{width:100%;padding:11px;border:1px solid var(--border);border-radius:12px;background:#fff}
    textarea{min-height:96px;resize:vertical}
    .tilegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
    .tile{padding:14px;border:1px solid var(--border);border-radius:14px;background:#fff;cursor:pointer;text-align:left}
    .tile:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
    .badge,.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:.8rem;font-weight:700}
    .badge{background:var(--primary-soft);color:var(--primary)}
    .pill.home{background:var(--ok-soft);color:var(--ok)}
    .pill.incarico{background:var(--warn-soft);color:var(--warn)}
    .pill.mine{background:var(--primary-soft);color:var(--primary)}
    .pill.sync{background:var(--info-soft);color:var(--info)}
    .pill.error{background:var(--danger-soft);color:var(--danger)}

    .article{display:grid;grid-template-columns:34px 1.5fr 1fr 1fr 1fr auto;gap:10px;align-items:center}

    .alert{display:none;padding:12px 14px;border-radius:12px;margin-bottom:12px}
    .alert.show{display:block}
    .alert.ok{background:var(--ok-soft);color:var(--ok);border:1px solid #bbf7d0}
    .alert.error{background:var(--danger-soft);color:var(--danger);border:1px solid #fecaca}
    .alert.info{background:var(--info-soft);color:var(--info);border:1px solid #99f6e4}
    .toast-wrap{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:1200;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:min(92vw,520px)}
    .toast{padding:12px 14px;border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border);background:#fff;opacity:0;transform:translateY(-8px);transition:all .18s ease}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.ok{background:var(--ok-soft);color:var(--ok);border-color:#bbf7d0}
    .toast.error{background:var(--danger-soft);color:var(--danger);border-color:#fecaca}
    .toast.info{background:var(--info-soft);color:var(--info);border-color:#99f6e4}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:12px;z-index:1000}
    .modal.open{display:flex}

    .modal-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-top:14px}
    .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.pinpad button{font-weight:800}
    .sidebar .nav{display:flex;flex-direction:column;gap:8px}.sidebar .nav button.active{background:var(--primary-soft);color:var(--primary);border-color:#bfdbfe;font-weight:700}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:10px;border-bottom:1px solid var(--border);vertical-align:top}
    th{font-size:.8rem;text-transform:uppercase;color:var(--muted)}
    .sticky-bar{position:fixed;left:10px;right:10px;bottom:10px;z-index:900}
    .sticky-bar .actions{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .preview-img{max-width:100%;border-radius:12px;border:1px solid var(--border)}
    .empty{padding:16px;border:1px dashed var(--border);border-radius:14px;background:#fff}
    .stats{display:grid;gap:12px;grid-template-columns:repeat(4,minmax(0,1fr))}
    .stat{border:1px solid var(--border);border-radius:14px;padding:14px;background:linear-gradient(180deg,#fff,#f8fbff)} .stat .value{font-size:1.6rem;font-weight:800;margin-top:6px}
    @media(max-width:980px){.layout{grid-template-columns:1fr}.g4,.g3,.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.article{grid-template-columns:34px 1fr 1fr}.article>:last-child{grid-column:2/-1}}
    @media(max-width:720px){.app{padding:10px;padding-bottom:110px}.g2,.g3,.g4,.stats{grid-template-columns:1fr}.actions,.modal-actions{flex-direction:column}.actions button,.modal-actions button{width:100%}.sticky-bar{left:8px;right:8px;bottom:8px;padding:10px}.sticky-bar .actions{grid-template-columns:repeat(2,minmax(0,1fr))}.article{grid-template-columns:28px 1fr}.article>div,.article>button{grid-column:2}.panel,.sidebar,.sticky-bar{padding:12px}table,thead,tbody,tr,th,td{display:block}thead{display:none}table{border-collapse:separate;border-spacing:0 8px}tbody tr{background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px;box-shadow:var(--shadow)}td{border:0;padding:5px 2px}td::before{content:attr(data-label);display:block;font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:3px}}
  </style>
</head>

let rtChannel = null;

const $=s=>document.querySelector(s);

function uid(){ return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${Math.random().toString(36).slice(2,9)}`; }
function nowIso(){ return new Date().toISOString(); }
function formatDate(iso){ return iso ? new Date(iso).toLocaleString('it-IT') : '-'; }
function esc(v){ return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
function hashPin(pin){ return btoa(`pin:${pin}:v1`); }
function touchSession(){ lastActivityAt = nowIso(); }
function sessionExpired(){ if(!lastActivityAt) return false; return (Date.now() - new Date(lastActivityAt).getTime()) > SESSION_TIMEOUT_MINUTES*60*1000; }
function ensureSession(){ if(sessionExpired()) logoutAll(); }
function logoutAll(){ currentUserId=null; currentLocationId=null; adminLogged=false; currentView='home'; selectedArticleIds=[]; currentSessionId=null; lastActivityAt=null; render(); }

function showToast(type,msg){
  const wrap = document.getElementById("toastWrap");
  if(!wrap) return;
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  requestAnimationFrame(()=>el.classList.add("show"));
  setTimeout(()=>{ el.classList.remove("show"); setTimeout(()=>el.remove(),180); }, 1800);
}
function showAlert(type,msg){
  alertState = {type, message: msg};
  renderAlertOnly();
  showToast(type,msg);
  setTimeout(()=>{ alertState=null; renderAlertOnly(); }, 2200);
}
function renderAlert(){ return !alertState ? '' : `<div class="alert show ${alertState.type}">${esc(alertState.message)}</div>`; }
function renderAlertOnly(){ const slot = document.getElementById("topAlertSlot"); if(slot) slot.innerHTML = renderAlert(); }

function renderTopbar(title,subtitle,extra=''){ return `<div class="top"><div><h1>${esc(title)}</h1><p>${esc(subtitle)}</p></div><div class="actions">${extra}</div></div>`; }
function renderSyncBadge(){ return `<span class="pill sync">${syncState==='syncing'?'Sincronizzazione...':'Realtime attivo'}</span>`; }
function renderSyncBadgeOnly(){ document.querySelectorAll('[data-sync-badge]').forEach(el=>el.innerHTML = renderSyncBadge()); }

function getUserName(id){ const u=db.users.find(x=>x.id===id); return u ? u.name : '-'; }
function getLocationName(id){ const l=db.locations.find(x=>x.id===id); return l ? l.name : '-'; }
function activeUsers(){ return db.users.filter(u=>u.active && u.role==='user'); }
function activeLocations(){ return db.locations.filter(l=>l.active); }
function activeArticlesForLocation(id){ return db.articles.filter(a=>a.active && a.location_id===id); }
function findArticle(id){ return db.articles.find(a=>a.id===id); }
function getOwnedArticles(){ return db.articles.filter(a=>a.active && a.current_holder_user_id===currentUserId); }
function isMine(a){ return !!currentUserId && a.current_holder_user_id===currentUserId; }

function statePill(a){
  const main = a.state==='home' ? `<span class="pill home">↓ Home</span>` : `<span class="pill incarico">↑ In carico</span>`;
  const mine = isMine(a) ? `<span class="pill mine">Lo hai tu</span>` : '';
  return main + (mine ? ` ${mine}` : '');
}
function movementLabel(type){ return {prelievo:'Prelievo',restituzione:'Restituzione',passaggio:'Passaggio',trasferimento:'Trasferimento'}[type] || type; }

function setGlobalSearch(v, caret=null){ globalSearchTerm=v; focusState={id:'globalSearch', caret: caret ?? v.length}; render(); }
function setLocationSearch(v, caret=null){ locationSearchTerm=v; focusState={id:'searchArticles', caret: caret ?? v.length}; render(); }
function restoreFocus(){
  if(!focusState) return;
  const el = document.getElementById(focusState.id);
  if(!el) return;
  const pos = Math.min(focusState.caret ?? el.value.length, el.value.length);
  requestAnimationFrame(()=>{ el.focus(); try{ el.setSelectionRange(pos,pos); }catch(e){} });
}
function getSearchResults(q){
  const needle=(q||'').trim().toLowerCase();
  if(!needle) return [];
  return db.articles.filter(a=>{
    const holder = getUserName(a.current_holder_user_id);
    const loc = getLocationName(a.location_id);
    return `${a.name} ${a.category||''} ${a.serial||''} ${a.internal_code||''} ${holder} ${loc} ${a.last_note||''}`.toLowerCase().includes(needle);
  }).slice(0,50);
}
function filterArticlesForUI(articles){
  const q=(locationSearchTerm||'').toLowerCase();
  return articles.filter(a=>`${a.name} ${a.serial||''} ${a.internal_code||''} ${a.category||''}`.toLowerCase().includes(q));
}

async function fetchAllData(){
  syncState='syncing'; renderSyncBadgeOnly();
  const [{data:users,error:eu},{data:locations,error:el},{data:articles,error:ea},{data:movements,error:em}] = await Promise.all([
    sb.from('users').select('*').order('name'),
    sb.from('locations').select('*').order('name'),
    sb.from('articles').select('*').order('name'),
    sb.from('movements').select('*').order('created_at',{ascending:false}).limit(300)
  ]);
  if(eu||el||ea||em){
    console.error({eu,el,ea,em});
    syncState='error';
    renderSyncBadgeOnly();
    showAlert('error','Errore caricamento dati da Supabase.');
    return false;
  }
  db = { users:users||[], locations:locations||[], articles:articles||[], movements:movements||[] };
  syncState='idle';
  renderSyncBadgeOnly();
  return true;
}

function subscribeRealtime(){
  if(rtChannel) return;
  rtChannel = sb.channel('tracken-app-live')
    .on('postgres_changes', { event:'*', schema:'public', table:'articles' }, async ()=>{ await fetchAllData(); render(); })
    .on('postgres_changes', { event:'*', schema:'public', table:'movements' }, async ()=>{ await fetchAllData(); render(); })
    .on('postgres_changes', { event:'*', schema:'public', table:'users' }, async ()=>{ await fetchAllData(); render(); })
    .on('postgres_changes', { event:'*', schema:'public', table:'locations' }, async ()=>{ await fetchAllData(); render(); })
    .subscribe((status)=>console.log('Realtime:', status));
}

async function initApp(){
  const ok = await fetchAllData();
  if(ok) subscribeRealtime();
  render();
}

async function saveMovementAndArticle(article, movement, articlePatch){
  syncState='syncing'; renderSyncBadgeOnly();
  const { error: e1 } = await sb.from('movements').insert(movement);
  if(e1){
    syncState='error'; renderSyncBadgeOnly();
    console.error(e1);
    showAlert('error', `Errore salvataggio movimento: ${e1.message}`);
    return false;
  }
  const { error: e2 } = await sb.from('articles').update(articlePatch).eq('id', article.id);
  if(e2){
    syncState='error'; renderSyncBadgeOnly();
    console.error(e2);
    showAlert('error', `Movimento salvato ma stato articolo non aggiornato: ${e2.message}`);
    return false;
  }
  await fetchAllData();
  render();
  return true;
}

async function compressImageFile(file, maxSide=1200, quality=0.7){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e=>{
      img.onload = ()=>{
        let {width,height}=img;
        const ratio = Math.min(1, maxSide / Math.max(width,height));
        const w = Math.round(width*ratio), h = Math.round(height*ratio);
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function handleMovementImageChange(e){
  const file = e.target.files?.[0];
  if(!file){ modalImageData=null; const p=document.getElementById("imgPreviewWrap"); if(p) p.innerHTML=""; return; }
  const data = await compressImageFile(file);
  modalImageData = data;
  const p=document.getElementById("imgPreviewWrap");
  if(p) p.innerHTML = `<img class="preview-img" src="${data}" alt="preview">`;
}

}

function renderStickyActions(){
  return `<div class="sticky-bar"><div class="actions">

function render(){
  ensureSession();
  const searchBox = renderGlobalSearchBox();
  const results = globalSearchTerm ? renderGlobalSearchResults() : '';
  const app=$('#app');

  if(adminLogged){
    const body = currentView==='admin_users' ? renderAdminUsers()
      : currentView==='admin_locations' ? renderAdminLocations()
      : currentView==='admin_articles' ? renderAdminArticles()
      : currentView==='admin_logs' ? renderAdminLogs()
      : renderAdminDashboard();
    app.innerHTML = `<div class="layout">${renderAdminSidebar()}<div><div class="panel" style="margin-bottom:12px">${renderTopbar('Ricerca globale','Admin e operatori possono localizzare rapidamente un articolo', `<span data-sync-badge>${renderSyncBadge()}</span>`)}${searchBox}<div id="globalResultsSlot">${results}</div></div>${body}</div></div>`;
    restoreFocus();
    return;
  }
  if(!currentUserId){
    app.innerHTML = renderHome(searchBox, results);
    restoreFocus();
    return;
  }
  if(!currentLocationId){
    app.innerHTML = renderUserLanding(searchBox, results);
    restoreFocus();
    return;
  }
  app.innerHTML = `${renderUserArticles(searchBox, results)}${renderStickyActions()}`;
  restoreFocus();
}

}
function setAdminView(view){ currentView=view; render(); }
function openModal(html){ $('#modalCard').innerHTML=html; $('#modal').classList.add('open'); }
function closeModal(){ $('#modal').classList.remove('open'); }
$('#modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeModal(); });

function openPinModal(userId){
  const user=db.users.find(u=>u.id===userId);
  openModal(`<h3>Accesso utente</h3><p>Hai selezionato <strong>${esc(user.name)}</strong>. Inserisci il PIN.</p>
    <label>PIN<input id="pinInput" type="password" maxlength="8"></label>

    <div class="modal-actions"><button onclick="closeModal()">Annulla</button><button class="primary" onclick="userLogin('${userId}')">Entra</button></div>`);

function pinKey(k){ const i=$('#pinInput'); if(!i) return; if(k==='C') i.value=''; else if(k==='←') i.value=i.value.slice(0,-1); else i.value += k; }
function userLogin(userId){
  const pin=$('#pinInput').value, user=db.users.find(u=>u.id===userId);
  if(user.pin_hash !== hashPin(pin)){ showAlert('error','PIN non valido.'); closeModal(); return; }
  currentUserId=userId; currentLocationId=null; currentSessionId=uid(); touchSession(); closeModal(); render();
}
function selectLocation(id){ currentLocationId=id; selectedArticleIds=[]; locationSearchTerm=''; render(); }
function toggleArticle(id){ const idx=selectedArticleIds.indexOf(id); if(idx>=0) selectedArticleIds.splice(idx,1); else selectedArticleIds.push(id); render(); }

function openMovementModal(type){
  if(!selectedArticleIds.length){ showAlert('error','Seleziona almeno un articolo.'); return; }
  modalImageData = null;
  const selected=selectedArticleIds.map(findArticle).filter(Boolean);
  const extra = type==='passaggio'
    ? `<label>Collega destinatario<select id="targetUser"><option value="">Seleziona collega</option>${activeUsers().filter(u=>u.id!==currentUserId).map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('')}</select></label>`
    : type==='trasferimento'
    ? `<label>Sede destinazione<select id="targetLocation"><option value="">Seleziona sede</option>${activeLocations().filter(l=>l.id!==currentLocationId).map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')}</select></label>`
    : '';
  openModal(`
    <h3>${movementLabel(type)}</h3>
    <ul>${selected.map(a=>`<li>${esc(a.name)} ${a.serial?`(${esc(a.serial)})`:''}</li>`).join('')}</ul>
    ${extra}
    <label>Nota<textarea id="movementNote" placeholder="Nota facoltativa"></textarea></label>
    <label>Immagine (facoltativa, compressa automaticamente)<input type="file" accept="image/*" onchange="handleMovementImageChange(event)"></label>
    <div id="imgPreviewWrap"></div>
    <div class="modal-actions"><button onclick="closeModal()">Annulla</button><button class="primary" onclick="confirmMovement('${type}')">Conferma</button></div>
  `);
}

async function confirmMovement(type){
  const note=$('#movementNote').value.trim(), targetUser=$('#targetUser')?.value||null, targetLocation=$('#targetLocation')?.value||null, articles=selectedArticleIds.map(findArticle).filter(Boolean);
  if(type==='passaggio'&&!targetUser){ showAlert('error','Seleziona il collega destinatario.'); closeModal(); return; }
  if(type==='trasferimento'&&!targetLocation){ showAlert('error','Seleziona la sede di destinazione.'); closeModal(); return; }

  for(const a of articles){
    if(type==='prelievo' && a.state!=='home'){ showAlert('error',`Prelievo non consentito: ${a.name} non è disponibile in home.`); closeModal(); return; }
    if(type==='restituzione' && a.state!=='in_carico'){ showAlert('error',`Restituzione non consentita: ${a.name} risulta già in home.`); closeModal(); return; }
    if(type==='passaggio' && a.state!=='in_carico'){ showAlert('error',`Passaggio non consentito: ${a.name} deve essere prima preso in carico.`); closeModal(); return; }
    if(type==='trasferimento' && a.state!=='home'){ showAlert('error',`Trasferimento non consentito: ${a.name} non è in home. Solo gli articoli in home possono essere spostati tra i cantieri.`); closeModal(); return; }
  }

  for(const a of articles){
    const movement = {
      article_id: a.id,
      article_name: a.name,
      article_serial: a.serial || '',
      movement_type: type,
      from_location_id: a.location_id,
      to_location_id: type==='trasferimento' ? targetLocation : a.location_id,
      from_user_id: type==='prelievo' ? null : a.current_holder_user_id,
      to_user_id: type==='prelievo' ? currentUserId : type==='passaggio' ? targetUser : null,
      recorded_by_user_id: currentUserId,
      note: note || '',
      image_data: modalImageData || null,
      session_id: currentSessionId || ''
    };
    let patch = {};
    if(type==='prelievo') patch = { state:'in_carico', current_holder_user_id:currentUserId, last_known_user_id:currentUserId, last_movement_at:nowIso(), last_note:note||'' };
    if(type==='restituzione') patch = { state:'home', current_holder_user_id:null, last_movement_at:nowIso(), last_note:note||'' };
    if(type==='passaggio') patch = { state:'in_carico', current_holder_user_id:targetUser, last_known_user_id:targetUser, last_movement_at:nowIso(), last_note:note||'' };
    if(type==='trasferimento') patch = { location_id:targetLocation, state:'home', current_holder_user_id:null, last_movement_at:nowIso(), last_note:note||'' };
    const ok = await saveMovementAndArticle(a, movement, patch);
    if(!ok){ closeModal(); return; }
  }
  selectedArticleIds=[]; closeModal(); showAlert('ok', `${movementLabel(type)} completato con successo.`); render();
}

function openHistory(articleId){
  const article=findArticle(articleId), logs=db.movements.filter(m=>m.article_id===articleId);
  openModal(`<h3>Storico articolo</h3><p><strong>${esc(article.name)}</strong> ${article.serial?`• ${esc(article.serial)}`:''}</p>
    ${logs.length ? `<table><thead><tr><th>Data</th><th>Tipo</th><th>Da sede</th><th>A sede</th><th>Da</th><th>A</th><th>Registrato da</th><th>Nota</th><th>Img</th></tr></thead><tbody>
      ${logs.map(log=>`<tr>
        <td data-label="Data">${formatDate(log.created_at)}</td>
        <td data-label="Tipo">${esc(movementLabel(log.movement_type))}</td>
        <td data-label="Da sede">${esc(getLocationName(log.from_location_id))}</td>
        <td data-label="A sede">${esc(getLocationName(log.to_location_id))}</td>
        <td data-label="Da">${esc(log.from_user_id?getUserName(log.from_user_id):'Home')}</td>
        <td data-label="A">${esc(log.to_user_id?getUserName(log.to_user_id):'Home')}</td>
        <td data-label="Registrato da">${esc(log.recorded_by_user_id?getUserName(log.recorded_by_user_id):'-')}</td>
        <td data-label="Nota">${esc(log.note||'-')}</td>
        <td data-label="Img">${log.image_data ? `<img src="${log.image_data}" class="preview-img" style="max-width:120px">` : '-'}</td>
      </tr>`).join('')}
    </tbody></table>` : `<div class="empty">Nessun movimento registrato.</div>`}
    <div class="modal-actions"><button class="primary" onclick="closeModal()">Chiudi</button></div>`);
}

async function createUser(){
  const name=$('#newUserName').value.trim(), pin=$('#newUserPin').value.trim(), role=$('#newUserRole').value;
  if(!name || !pin){ showAlert('error','Inserisci nome e PIN.'); return; }
  const { error } = await sb.from('users').insert({ name, pin_hash:hashPin(pin), role, active:true });
  if(error) return showAlert('error', error.message);
  await fetchAllData(); render(); showAlert('ok','Utente creato.');
}
async function resetPin(id){
  const pin=prompt('Nuovo PIN:'); if(!pin) return;
  const { error } = await sb.from('users').update({ pin_hash:hashPin(pin) }).eq('id', id);
  if(error) return showAlert('error', error.message);
  await fetchAllData(); render(); showAlert('ok','PIN aggiornato.');
}
async function deleteUser(id){
  if(!confirm("ATTENZIONE: cancelli definitivamente l'utente?")) return;
  await sb.from('articles').update({ current_holder_user_id:null }).eq('current_holder_user_id', id);
  await sb.from('articles').update({ last_known_user_id:null }).eq('last_known_user_id', id);
  const { error } = await sb.from('users').delete().eq('id', id);
  if(error) return showAlert('error', error.message);
  await fetchAllData(); render(); showAlert('ok','Utente cancellato.');
}
async function createLocation(){
  const name=$('#newLocName').value.trim(), type=$('#newLocType').value, notes=$('#newLocNotes').value.trim();
  if(!name) return showAlert('error','Inserisci il nome della sede.');
  const { error } = await sb.from('locations').insert({ name, type, notes, active:true });
  if(error) return showAlert('error', error.message);
  await fetchAllData(); render(); showAlert('ok','Sede creata.');
}
async function deleteLocation(id){
  if(db.articles.some(a=>a.location_id===id && a.active)){ return showAlert('error','Non puoi cancellare una sede che contiene articoli attivi.'); }
  if(!confirm("ATTENZIONE: cancelli definitivamente la sede?")) return;
  const { error } = await sb.from('locations').delete().eq('id', id);
  if(error) return showAlert('error', error.message);
  await fetchAllData(); render(); showAlert('ok','Sede cancellata.');
}
async function createArticle(){
  const name=$('#newArtName').value.trim(), category=$('#newArtCategory').value.trim(), internal_code=$('#newArtCode').value.trim(), serial=$('#newArtSerial').value.trim(), location_id=$('#newArtLoc').value, state=$('#newArtState').value, userId=$('#newArtUser').value||null;
  if(!name) return showAlert('error','Inserisci il nome articolo.');
  if(state==='in_carico' && !userId) return showAlert('error','Se lo stato è in carico seleziona un possessore.');
  const { error } = await sb.from('articles').insert({ name, category, internal_code, serial, active:true, location_id, state, current_holder_user_id:state==='in_carico'?userId:null, last_known_user_id:state==='in_carico'?userId:null, last_note:'' });
  if(error) return showAlert('error', error.message);
  await fetchAllData(); render(); showAlert('ok','Articolo creato.');
}
async function deleteArticle(id){
  if(!confirm("ATTENZIONE: cancelli definitivamente l'articolo? Lo storico dei movimenti resterà nel log.")) return;
  const { error } = await sb.from('articles').delete().eq('id', id);
  if(error) return showAlert('error', error.message);
  await fetchAllData(); render(); showAlert('ok','Articolo cancellato.');
}

function exportLocationPdf(){
  const locationId = document.getElementById('pdfLocation').value;
  const location = db.locations.find(l=>l.id===locationId);
  const articles = db.articles.filter(a=>a.location_id===locationId && a.active);
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Elenco materiale - ${esc(location.name)}</title><style>body{font-family:Arial;padding:20px} table{width:100%;border-collapse:collapse} th,td{border:1px solid #ccc;padding:8px;text-align:left} h1{margin:0 0 10px 0} .m{color:#555}</style></head><body><h1>Elenco materiale - ${esc(location.name)}</h1><div class="m">Data export: ${new Date().toLocaleString('it-IT')}</div><table><thead><tr><th>Articolo</th><th>Categoria</th><th>Codice/Seriale</th><th>Stato</th><th>Possessore</th><th>Ultimo movimento</th></tr></thead><tbody>${articles.map(a=>`<tr><td>${esc(a.name)}</td><td>${esc(a.category||'-')}</td><td>${esc(a.serial||a.internal_code||'-')}</td><td>${a.state==='home'?'Home':'In carico'}</td><td>${esc(a.current_holder_user_id?getUserName(a.current_holder_user_id):'Home')}</td><td>${formatDate(a.last_movement_at)}</td></tr>`).join('')}</tbody></table></body></html>`);
  w.document.close(); w.focus(); w.print();
}
