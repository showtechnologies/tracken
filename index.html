<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracken - Gestione Attrezzature (GitHub)</title>
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--border:#dbe3ee;--primary:#1d4ed8;--ok:#166534;--warn:#92400e;--danger:#b91c1c;--shadow:0 10px 30px rgba(15,23,42,.08);--r:16px}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit}.app{max-width:1240px;margin:0 auto;padding:16px}
    .panel,.sidebar,.modal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
    .layout{display:grid;grid-template-columns:260px 1fr;gap:16px}.grid{display:grid;gap:12px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .tilegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.tile{padding:14px;border:1px solid var(--border);border-radius:14px;background:#fff;cursor:pointer}
    .tile:hover,button:hover{transform:translateY(-1px)}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}.top h1,.top h2,.top h3{margin:0}
    .top p,.muted{color:var(--muted)}.small{font-size:.84rem}.actions{display:flex;flex-wrap:wrap;gap:8px}.grow{flex:1}
    button{border:1px solid var(--border);background:#fff;padding:10px 12px;border-radius:12px;cursor:pointer}
    .primary{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700}.ok{background:#dcfce7;border-color:#bbf7d0;color:var(--ok);font-weight:700}.warn{background:#fef3c7;border-color:#fde68a;color:var(--warn);font-weight:700}.danger{background:#fee2e2;border-color:#fecaca;color:var(--danger);font-weight:700}.soft{background:#dbeafe;border-color:#bfdbfe;color:#1d4ed8;font-weight:700}
    label{display:flex;flex-direction:column;gap:6px;font-weight:600;font-size:.92rem}input,select,textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:12px;background:#fff}textarea{min-height:82px}
    .stats{display:grid;gap:12px;grid-template-columns:repeat(4,minmax(0,1fr))}.stat{border:1px solid var(--border);border-radius:14px;padding:14px;background:linear-gradient(180deg,#fff,#f8fbff)}.stat .value{font-size:1.6rem;font-weight:800;margin-top:6px}
    .badge,.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:.82rem;font-weight:700}.badge{background:#dbeafe;color:#1d4ed8}.home{background:#dcfce7;color:#166534}.incarico{background:#fef3c7;color:#92400e}.activep{background:#dcfce7;color:#166534}.inactivep{background:#f3f4f6;color:#4b5563}
    .articlelist{display:flex;flex-direction:column;gap:10px}.article{display:grid;grid-template-columns:34px 1.6fr 1fr 1fr 1fr auto;gap:10px;align-items:center;border:1px solid var(--border);border-radius:14px;padding:12px;background:#fff}.article.selected{border-color:#93c5fd;background:#f8fbff}
    table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--border);vertical-align:top}th{font-size:.8rem;text-transform:uppercase;color:var(--muted)}
    .nav{display:flex;flex-direction:column;gap:8px}.nav button.active{background:#dbeafe;border-color:#bfdbfe;color:#1d4ed8;font-weight:700}
    .alert{display:none;padding:12px 14px;border-radius:12px;margin-bottom:12px}.alert.show{display:block}.alert.ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}.alert.error{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:14px;z-index:1000}.modal.open{display:flex}.modal-card{width:min(760px,100%);max-height:92vh;overflow:auto}.modal-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-top:14px}.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.pinpad button{font-weight:800}
    .code{font-family:ui-monospace,monospace;background:#f8fafc;border:1px solid var(--border);padding:8px 10px;border-radius:10px}
    @media(max-width:980px){.layout{grid-template-columns:1fr}.g4{grid-template-columns:repeat(2,minmax(0,1fr))}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.article{grid-template-columns:34px 1fr 1fr}.article>:last-child{grid-column:2/-1}}
    @media(max-width:720px){.app{padding:10px}.g2,.g4,.stats{grid-template-columns:1fr}.actions,.modal-actions{flex-direction:column}.actions button,.modal-actions button{width:100%}.article{grid-template-columns:28px 1fr}.article>div,.article>button{grid-column:2}table,thead,tbody,tr,th,td{display:block}thead{display:none}table{border-collapse:separate;border-spacing:0 8px}tbody tr{background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px;box-shadow:var(--shadow)}td{border:0;padding:5px 2px}td::before{content:attr(data-label);display:block;font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:3px}}
  </style>
</head>
<body>
<div class="app" id="app"></div>
<div class="modal" id="modal"><div class="modal-card" id="modalCard"></div></div>
<script>
const ADMIN_USER="admin", ADMIN_PASSWORD="admin123", SESSION_TIMEOUT_MINUTES=20;
const GITHUB_TOKEN="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";
const GITHUB_OWNER="showtechnologies";
const GITHUB_REPO="tracken";
const GITHUB_FILE="database.json";
const GITHUB_BRANCH="main";
let db=null, currentUserId=null, currentLocationId=null, adminLogged=false, currentView="home", selectedArticleIds=[], lastActivityAt=null, currentSessionId=null, alertState=null, currentSHA=null;
const $=s=>document.querySelector(s);

function uid(p='id'){ return `${p}_${Math.random().toString(36).slice(2,10)}_${Date.now().toString(36)}` }
function nowIso(){ return new Date().toISOString() }
function formatDate(iso){ return iso ? new Date(iso).toLocaleString('it-IT') : '-' }
function esc(v){ return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;') }
function hashPin(pin){ return btoa(`pin:${pin}:v1`) }
function getUserName(id){ const u=db?.users?.find(x=>x.id===id); return u?u.name:'-' }
function getLocationName(id){ const l=db?.locations?.find(x=>x.id===id); return l?l.name:'-' }
function activeUsers(){ return db.users.filter(u=>u.active && u.role==='user') }
function activeLocations(){ return db.locations.filter(l=>l.active) }
function activeArticlesForLocation(id){ return db.articles.filter(a=>a.active && a.locationId===id) }
function findArticle(id){ return db.articles.find(a=>a.id===id) }
function showAlert(type,msg){ alertState={type,message:msg}; setTimeout(()=>{ alertState=null; render() },2500) }
function renderAlert(){ return !alertState?'':`<div class="alert show ${alertState.type}">${esc(alertState.message)}</div>` }
function touchSession(){ lastActivityAt=nowIso() }
function sessionExpired(){ if(!lastActivityAt) return false; return (Date.now()-new Date(lastActivityAt).getTime())>SESSION_TIMEOUT_MINUTES*60*1000 }
function logoutAll(){ currentUserId=null; currentLocationId=null; adminLogged=false; currentView='home'; selectedArticleIds=[]; currentSessionId=null; lastActivityAt=null; render() }
function ensureSession(){ if(sessionExpired()) logoutAll() }
function confirmDelete(label){ return confirm(`ATTENZIONE: stai per disattivare ${label}. Lo storico resterà nel log, ma la voce non comparirà più nelle liste attive. Vuoi continuare?`) }

function defaultDatabase(){ return null }
function utf8ToBase64(str){ return btoa(unescape(encodeURIComponent(str))); }
function base64ToUtf8(str){ return decodeURIComponent(escape(atob(str))); }

async function loadFromGitHub(show=true){
  if(!isGitHubConfigured()){
    if(show) showAlert('error','Inserisci token, owner e repo nelle costanti in alto.');
    render();
    return false;
  }

  try{
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}?ref=${GITHUB_BRANCH}`;
    console.log("LOAD URL:", url);

    const res = await fetch(url,{
      headers:{
        Authorization:`Bearer ${GITHUB_TOKEN}`,
        Accept:'application/vnd.github+json'
      }
    });

    const raw = await res.text();
    console.log("LOAD STATUS:", res.status);
    console.log("LOAD BODY:", raw);

    if(!res.ok){
      if(show) showAlert('error', `Errore GitHub ${res.status}. Apri la console.`);
      render();
      return false;
    }

    const data = JSON.parse(raw);
    currentSHA = data.sha;
    db = JSON.parse(base64ToUtf8(data.content.replace(/\\n/g,'')));

    if(show) showAlert('ok','database.json caricato da GitHub.');
    render();
    return true;
  }catch(err){
    console.error("LOAD EXCEPTION:", err);
    if(show) showAlert('error','Errore caricamento GitHub. Apri la console.');
    render();
    return false;
  }
}

async function saveJsonFile(show=true){
  if(!db){
    showAlert('error','Database non caricato.');
    render();
    return false;
  }
  if(!currentSHA){
    showAlert('error','Carica prima database.json da GitHub.');
    render();
    return false;
  }
  if(!isGitHubConfigured()){
    showAlert('error','Inserisci token, owner e repo nelle costanti in alto.');
    render();
    return false;
  }
  try{
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    let res = await fetch(url,{
      method:'PUT',
      headers:{
        Authorization:`Bearer ${GITHUB_TOKEN}`,
        Accept:'application/vnd.github+json'
      },
      body: JSON.stringify({
        message:'update database',
        content:utf8ToBase64(JSON.stringify(db,null,2)),
        sha: currentSHA,
        branch: GITHUB_BRANCH
      })
    });

    if(res.status === 409 || res.status === 422){
      const reloadOk = await loadFromGitHub(false);
      if(!reloadOk) throw new Error('Conflitto SHA');
      res = await fetch(url,{
        method:'PUT',
        headers:{
          Authorization:`Bearer ${GITHUB_TOKEN}`,
          Accept:'application/vnd.github+json'
        },
        body: JSON.stringify({
          message:'update database',
          content:utf8ToBase64(JSON.stringify(db,null,2)),
          sha: currentSHA,
          branch: GITHUB_BRANCH
        })
      });
    }

    const raw = await res.text();
    console.log("SAVE STATUS:", res.status);
    console.log("SAVE BODY:", raw);

    if(!res.ok){
      throw new Error(raw || 'Errore salvataggio GitHub');
    }

    const data = JSON.parse(raw);
    currentSHA = data.content.sha;
    if(show) showAlert('ok','database.json aggiornato su GitHub.');
    return true;
  }catch(err){
    console.error("SAVE EXCEPTION:", err);
    if(show) showAlert('error','Impossibile salvare su GitHub. Apri la console.');
    render();
    return false;
  }
}

async function importFromFile(file){
  showAlert('error','Importa JSON non disponibile in modalità GitHub.');
  render();
}
function exportDatabase(){
  if(!db) return;
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='database.json'; a.click();
  URL.revokeObjectURL(url);
}

function statePill(a){ return a.state==='home'?`<span class="pill home">↓ Home</span>`:`<span class="pill incarico">↑ In carico</span>` }
function recordMovement({movementType,article,fromLocationId,toLocationId,fromUserId,toUserId,note}){
  const m={id:uid('mov'),timestamp:nowIso(),movementType,articleId:article.id,articleName:article.name,articleSerial:article.serial||'',fromLocationId,toLocationId,fromUserId,toUserId,recordedByUserId:currentUserId,note:note||'',sessionId:currentSessionId||uid('sess')};
  db.movements.unshift(m);
  article.locationId=toLocationId;
  article.state=(movementType==='prelievo'||movementType==='passaggio')?'in_carico':'home';
  article.currentHolderUserId=(movementType==='prelievo'||movementType==='passaggio')?toUserId:null;
  if(toUserId) article.lastKnownUserId=toUserId;
  article.lastMovementAt=m.timestamp;
  article.lastNote=note||'';
}

function openModal(html){ $('#modalCard').innerHTML=html; $('#modal').classList.add('open') }
function closeModal(){ $('#modal').classList.remove('open') }
$('#modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeModal() })

function renderTopbar(title,subtitle,extra=''){ return `<div class="top"><div><h1>${esc(title)}</h1><p>${esc(subtitle)}</p></div><div class="actions">${extra}</div></div>` }
function render(){
  ensureSession();
  const app=$('#app');
  if(!db){
    app.innerHTML=`<div class="panel">${renderAlert()}${renderTopbar('Tracken - GitHub','Questa versione legge e aggiorna database.json direttamente nel repository')}<div class="actions"><button class="primary" onclick="loadFromGitHub()">Carica database da GitHub</button></div><p class="small muted" style="margin-top:12px">Inserisci token, owner e repo nelle costanti in alto, poi premi il pulsante di caricamento.</p></div>`;
    return;
  }
  if(adminLogged){
    let body=currentView==='admin_users'?renderAdminUsers():currentView==='admin_locations'?renderAdminLocations():currentView==='admin_articles'?renderAdminArticles():currentView==='admin_logs'?renderAdminLogs():renderAdminDashboard();
    app.innerHTML=`<div class="layout">${renderAdminSidebar()}<div>${renderAlert()}${body}</div></div>`;
    return;
  }
  if(!currentUserId){ app.innerHTML=`${renderAlert()}${renderHome()}`; return; }
  if(!currentLocationId){ app.innerHTML=`${renderAlert()}${renderLocationChooser()}`; return; }
  app.innerHTML=`${renderAlert()}${renderUserArticles()}`
}

function renderHome(){ return `<div class="panel">${renderTopbar('Tracken - GitHub','Ora il salvataggio aggiorna direttamente database.json nel repository',`<span class="badge">${currentSHA?'database caricato':'database non caricato'}</span>`)}<div class="panel" style="margin-bottom:12px"><h3>Database remoto</h3><div class="actions"><button class="soft" onclick="loadFromGitHub()">Ricarica database da GitHub</button><button class="ok" onclick="saveJsonFile()">Salva su GitHub</button><button onclick="exportDatabase()">Esporta copia</button></div><p class="small muted" style="margin-top:10px">Prima di modificare dati premi almeno una volta "Carica database da GitHub". Le modifiche verranno salvate direttamente nel repository.</p></div><div class="grid g2"><div class="panel" style="margin:0"><h3>Login admin</h3><div class="grid g2"><label>Username<input id="adminUser" value="admin"></label><label>Password<input id="adminPass" type="password" value="admin123"></label></div><div class="actions" style="margin-top:12px"><button class="primary" onclick="adminLogin()">Accedi come admin</button></div></div><div class="panel" style="margin:0"><h3>Operatori</h3><div class="tilegrid">${activeUsers().map(u=>`<button class="tile" onclick="openPinModal('${u.id}')"><strong>${esc(u.name)}</strong><div class="muted small">Tocca e inserisci il PIN</div></button>`).join('')}</div></div></div></div>` }
function handleImport(event){
  showAlert('error','Importa JSON non disponibile in modalità GitHub.');
  render();
}
function adminLogin(){ const u=$('#adminUser').value.trim(), p=$('#adminPass').value; if(u!==ADMIN_USER||p!==ADMIN_PASSWORD){ showAlert('error','Credenziali admin non valide.'); render(); return; } adminLogged=true; currentView='admin_dashboard'; currentSessionId=uid('sess'); touchSession(); render() }
function openPinModal(userId){ const user=db.users.find(u=>u.id===userId); openModal(`<h3>Accesso utente</h3><p>Hai selezionato <strong>${esc(user.name)}</strong>. Inserisci il PIN.</p><label>PIN<input id="pinInput" type="password" maxlength="8"></label><div class="pinpad">${[1,2,3,4,5,6,7,8,9,'C',0,'←'].map(k=>`<button onclick="pinKey('${k}')">${k}</button>`).join('')}</div><div class="modal-actions"><button onclick="closeModal()">Annulla</button><button class="primary" onclick="userLogin('${userId}')">Entra</button></div>`) }
function pinKey(k){ const i=$('#pinInput'); if(!i) return; if(k==='C') i.value=''; else if(k==='←') i.value=i.value.slice(0,-1); else i.value+=k }
function userLogin(userId){ const pin=$('#pinInput').value, user=db.users.find(u=>u.id===userId); if(user.pinHash!==hashPin(pin)){ showAlert('error','PIN non valido.'); closeModal(); render(); return; } currentUserId=userId; currentLocationId=null; currentSessionId=uid('sess'); touchSession(); closeModal(); render() }

function renderLocationChooser(){ return `<div class="panel">${renderTopbar('Selezione sede','Scegli il cantiere o il magazzino su cui vuoi operare',`<button class="danger" onclick="logoutAll()">Logout</button><span class="badge">Utente: ${esc(getUserName(currentUserId))}</span>`)}<div class="tilegrid">${activeLocations().map(l=>`<button class="tile" onclick="selectLocation('${l.id}')"><strong>${esc(l.name)}</strong><div style="margin-top:6px"><span class="pill">${esc(l.type)}</span></div></button>`).join('')}</div></div>` }
function selectLocation(id){ currentLocationId=id; selectedArticleIds=[]; touchSession(); render() }

function renderUserArticles(){
  const articles=activeArticlesForLocation(currentLocationId).sort((a,b)=>a.name.localeCompare(b.name));
  return `<div class="panel">${renderTopbar(getLocationName(currentLocationId),'Ogni conferma salva direttamente su database.json',`<button onclick="currentLocationId=null;selectedArticleIds=[];render()">Cambia sede</button><button class="danger" onclick="logoutAll()">Logout</button><span class="badge">${esc(getUserName(currentUserId))}</span>`)}<div class="actions" style="margin-bottom:12px"><label class="grow">Ricerca articolo o seriale<input id="searchArticles" placeholder="Nome, codice o seriale" oninput="render()"></label></div><div class="articlelist">${filterArticlesForUI(articles).map(renderArticleRow).join('') || `<div class="panel">Nessun articolo trovato.</div>`}</div><div class="actions" style="margin-top:12px"><button class="primary" onclick="openMovementModal('prelievo')">↑ Preleva</button><button class="ok" onclick="openMovementModal('restituzione')">↓ Restituisci</button><button class="warn" onclick="openMovementModal('passaggio')">↔ Passa a collega</button><button class="soft" onclick="openMovementModal('trasferimento')">→ Trasferisci</button></div></div>`
}
function filterArticlesForUI(articles){ const qv=$('#searchArticles')?.value?.toLowerCase()||''; return articles.filter(a=>`${a.name} ${a.serial||''} ${a.internalCode||''}`.toLowerCase().includes(qv)) }
function toggleArticle(id){ const idx=selectedArticleIds.indexOf(id); if(idx>=0) selectedArticleIds.splice(idx,1); else selectedArticleIds.push(id); touchSession(); render() }
function renderArticleRow(a){ const selected=selectedArticleIds.includes(a.id); return `<div class="article ${selected?'selected':''}"><input type="checkbox" ${selected?'checked':''} onchange="toggleArticle('${a.id}')"><div><strong>${esc(a.name)}</strong><div class="muted small">${esc(a.category||'-')} ${a.serial?'• '+esc(a.serial):''}</div></div><div><div class="small muted">Stato</div>${statePill(a)}</div><div><div class="small muted">Possessore</div>${esc(a.currentHolderUserId?getUserName(a.currentHolderUserId):'Home')}</div><div><div class="small muted">Ultimo user</div>${esc(a.lastKnownUserId?getUserName(a.lastKnownUserId):'-')}</div><div class="actions"><button onclick="openHistory('${a.id}')">Storico</button></div></div>` }
function openMovementModal(type){
  if(!selectedArticleIds.length){ showAlert('error','Seleziona almeno un articolo.'); render(); return; }
  const selected=selectedArticleIds.map(findArticle).filter(Boolean);
  const extra=type==='passaggio'
    ? `<label>Collega destinatario<select id="targetUser"><option value="">Seleziona collega</option>${activeUsers().filter(u=>u.id!==currentUserId).map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('')}</select></label>`
    : type==='trasferimento'
    ? `<label>Sede destinazione<select id="targetLocation"><option value="">Seleziona sede</option>${activeLocations().filter(l=>l.id!==currentLocationId).map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')}</select></label>`
    : '';
  openModal(`<h3>${type}</h3><p>Articoli selezionati:</p><ul>${selected.map(a=>`<li>${esc(a.name)} ${a.serial?'('+esc(a.serial)+')':''}</li>`).join('')}</ul>${extra}<label>Nota<textarea id="movementNote" placeholder="Nota facoltativa"></textarea></label><div class="modal-actions"><button onclick="closeModal()">Annulla</button><button class="primary" onclick="confirmMovement('${type}')">Conferma</button></div>`)
}
async function confirmMovement(type){
  const note=$('#movementNote').value.trim(), targetUser=$('#targetUser')?.value||null, targetLocation=$('#targetLocation')?.value||null, articles=selectedArticleIds.map(findArticle).filter(Boolean);
  if(type==='passaggio'&&!targetUser){ showAlert('error','Seleziona il collega destinatario.'); closeModal(); render(); return; }
  if(type==='trasferimento'&&!targetLocation){ showAlert('error','Seleziona la sede di destinazione.'); closeModal(); render(); return; }
  for(const a of articles){
    if(type==='prelievo'&&a.state!=='home'){ showAlert('error',`L'articolo ${a.name} non è in home.`); closeModal(); render(); return; }
    if(type==='restituzione'&&a.state!=='in_carico'){ showAlert('error',`L'articolo ${a.name} risulta già in home.`); closeModal(); render(); return; }
    if(type==='passaggio'&&a.state!=='in_carico'){ showAlert('error',`L'articolo ${a.name} deve essere in carico per il passaggio.`); closeModal(); render(); return; }
    if(type==='trasferimento'&&a.state!=='home'){ showAlert('error',`L'articolo ${a.name} può essere trasferito solo quando è in home.`); closeModal(); render(); return; }
  }
  for(const a of articles){
    if(type==='prelievo') recordMovement({movementType:'prelievo',article:a,fromLocationId:a.locationId,toLocationId:a.locationId,fromUserId:null,toUserId:currentUserId,note});
    if(type==='restituzione') recordMovement({movementType:'restituzione',article:a,fromLocationId:a.locationId,toLocationId:a.locationId,fromUserId:a.currentHolderUserId,toUserId:null,note});
    if(type==='passaggio') recordMovement({movementType:'passaggio',article:a,fromLocationId:a.locationId,toLocationId:a.locationId,fromUserId:a.currentHolderUserId,toUserId:targetUser,note});
    if(type==='trasferimento') recordMovement({movementType:'trasferimento',article:a,fromLocationId:a.locationId,toLocationId:targetLocation,fromUserId:null,toUserId:null,note});
  }
  selectedArticleIds=[];
  closeModal();
  await saveJsonFile();
  render();
}
function openHistory(articleId){
  const article=findArticle(articleId), logs=db.movements.filter(m=>m.articleId===articleId);
  openModal(`<h3>Storico articolo</h3><p><strong>${esc(article.name)}</strong> ${article.serial?'• '+esc(article.serial):''}</p>${logs.length?`<table><thead><tr><th>Data</th><th>Tipo</th><th>Da sede</th><th>A sede</th><th>Da</th><th>A</th><th>Registrato da</th><th>Nota</th></tr></thead><tbody>${logs.map(log=>`<tr><td data-label="Data">${formatDate(log.timestamp)}</td><td data-label="Tipo">${esc(log.movementType)}</td><td data-label="Da sede">${esc(getLocationName(log.fromLocationId))}</td><td data-label="A sede">${esc(getLocationName(log.toLocationId))}</td><td data-label="Da">${esc(log.fromUserId?getUserName(log.fromUserId):'Home')}</td><td data-label="A">${esc(log.toUserId?getUserName(log.toUserId):'Home')}</td><td data-label="Registrato da">${esc(getUserName(log.recordedByUserId))}</td><td data-label="Nota">${esc(log.note||'-')}</td></tr>`).join('')}</tbody></table>`:`<div class="panel">Nessun movimento registrato.</div>`}<div class="modal-actions"><button class="primary" onclick="closeModal()">Chiudi</button></div>`)
}

function renderAdminSidebar(){ return `<div class="sidebar"><h3>Area admin</h3><div class="nav"><button class="${currentView==='admin_dashboard'?'active':''}" onclick="setAdminView('admin_dashboard')">Dashboard</button><button class="${currentView==='admin_users'?'active':''}" onclick="setAdminView('admin_users')">Utenti</button><button class="${currentView==='admin_locations'?'active':''}" onclick="setAdminView('admin_locations')">Cantieri / sedi</button><button class="${currentView==='admin_articles'?'active':''}" onclick="setAdminView('admin_articles')">Attrezzature</button><button class="${currentView==='admin_logs'?'active':''}" onclick="setAdminView('admin_logs')">Storico globale</button></div><div class="actions" style="margin-top:14px"><button onclick="logoutAll()">Esci</button><button class="ok" onclick="saveJsonFile()">Salva GitHub</button></div></div>` }
function setAdminView(view){ currentView=view; touchSession(); render() }
function renderAdminDashboard(){
  const total=db.articles.filter(a=>a.active).length, home=db.articles.filter(a=>a.active&&a.state==='home').length, inUse=db.articles.filter(a=>a.active&&a.state==='in_carico').length, locs=db.locations.filter(l=>l.active).length;
  return `<div class="panel">${renderTopbar('Dashboard amministrativa','Versione GitHub con scrittura diretta su database.json',`<span class="badge">GitHub: ${currentSHA?'connesso':'non caricato'}</span>`)}<div class="stats"><div class="stat"><div class="muted">Attrezzature attive</div><div class="value">${total}</div></div><div class="stat"><div class="muted">Disponibili in home</div><div class="value">${home}</div></div><div class="stat"><div class="muted">In carico</div><div class="value">${inUse}</div></div><div class="stat"><div class="muted">Sedi attive</div><div class="value">${locs}</div></div></div></div><div class="panel"><h3>File collegato</h3><p class="small muted">Ogni modifica salva direttamente nel repository GitHub. La struttura di <span class="code">database.json</span> resta invariata.</p><div class="actions"><button class="ok" onclick="saveJsonFile()">Salva su GitHub</button><button onclick="exportDatabase()">Esporta copia</button></div></div>`
}
function renderAdminUsers(){ return `<div class="panel">${renderTopbar('Utenti','Solo l\'admin può creare e disattivare utenti')}<div class="grid g4"><label>Nome<input id="newUserName" placeholder="Es. Marco Neri"></label><label>PIN<input id="newUserPin" placeholder="4 cifre"></label><label>Ruolo<select id="newUserRole"><option value="user">User</option><option value="admin">Admin</option></select></label><label>&nbsp;<button class="primary" onclick="createUser()">Crea utente</button></label></div></div><div class="panel"><table><thead><tr><th>Nome</th><th>Ruolo</th><th>Stato</th><th>Creato il</th><th>Azioni</th></tr></thead><tbody>${db.users.map(u=>`<tr><td data-label="Nome">${esc(u.name)}</td><td data-label="Ruolo">${esc(u.role)}</td><td data-label="Stato"><span class="pill ${u.active?'activep':'inactivep'}">${u.active?'Attivo':'Disattivo'}</span></td><td data-label="Creato">${formatDate(u.createdAt)}</td><td data-label="Azioni" class="actions"><button onclick="resetPin('${u.id}')">Reset PIN</button>${u.active?`<button class="danger" onclick="deactivateUser('${u.id}')">Disattiva</button>`:`<button class="ok" onclick="reactivateUser('${u.id}')">Riattiva</button>`}</td></tr>`).join('')}</tbody></table></div>` }
async function createUser(){ const name=$('#newUserName').value.trim(), pin=$('#newUserPin').value.trim(), role=$('#newUserRole').value; if(!name||!pin){ showAlert('error','Inserisci nome e PIN.'); render(); return; } db.users.push({id:uid('u'),name,pinHash:hashPin(pin),role,active:true,createdAt:nowIso()}); await saveJsonFile(); render() }
async function resetPin(id){ const pin=prompt('Nuovo PIN:'); if(!pin) return; db.users.find(u=>u.id===id).pinHash=hashPin(pin); await saveJsonFile(); render() }
async function deactivateUser(id){ if(!confirmDelete("l'utente selezionato")) return; db.users.find(u=>u.id===id).active=false; await saveJsonFile(); render() }
async function reactivateUser(id){ db.users.find(u=>u.id===id).active=true; await saveJsonFile(); render() }

function renderAdminLocations(){ return `<div class="panel">${renderTopbar('Cantieri / sedi','Solo l\'admin può creare e chiudere sedi')}<div class="grid g4"><label>Nome<input id="newLocName" placeholder="Es. Cantiere Chiavari"></label><label>Tipo<select id="newLocType"><option value="cantiere">Cantiere</option><option value="magazzino">Magazzino</option></select></label><label>Note<input id="newLocNotes" placeholder="Facoltative"></label><label>&nbsp;<button class="primary" onclick="createLocation()">Crea sede</button></label></div></div><div class="panel"><table><thead><tr><th>Nome</th><th>Tipo</th><th>Stato</th><th>Note</th><th>Azioni</th></tr></thead><tbody>${db.locations.map(l=>`<tr><td data-label="Nome">${esc(l.name)}</td><td data-label="Tipo"><span class="pill">${esc(l.type)}</span></td><td data-label="Stato"><span class="pill ${l.active?'activep':'inactivep'}">${l.active?'Attiva':'Chiusa'}</span></td><td data-label="Note">${esc(l.notes||'-')}</td><td data-label="Azioni" class="actions">${l.active?`<button class="danger" onclick="closeLocation('${l.id}')">Chiudi</button>`:`<button class="ok" onclick="reopenLocation('${l.id}')">Riapri</button>`}</td></tr>`).join('')}</tbody></table></div>` }
async function createLocation(){ const name=$('#newLocName').value.trim(), type=$('#newLocType').value, notes=$('#newLocNotes').value.trim(); if(!name){ showAlert('error','Inserisci il nome della sede.'); render(); return; } db.locations.push({id:uid('l'),name,type,active:true,notes,createdAt:nowIso()}); await saveJsonFile(); render() }
async function closeLocation(id){ if(!confirmDelete('la sede selezionata')) return; db.locations.find(l=>l.id===id).active=false; await saveJsonFile(); render() }
async function reopenLocation(id){ db.locations.find(l=>l.id===id).active=true; await saveJsonFile(); render() }

function renderAdminArticles(){ return `<div class="panel">${renderTopbar('Attrezzature','Solo l\'admin può creare e disattivare articoli')}<div class="grid g4"><label>Nome<input id="newArtName" placeholder="Es. Trapano Bosch"></label><label>Categoria<input id="newArtCategory" placeholder="Es. Trapani"></label><label>Codice interno<input id="newArtCode" placeholder="Es. TRP-009"></label><label>Seriale<input id="newArtSerial" placeholder="Facoltativo"></label><label>Sede iniziale<select id="newArtLoc">${activeLocations().map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')}</select></label><label>Stato iniziale<select id="newArtState"><option value="home">Home</option><option value="in_carico">In carico</option></select></label><label>Possessore iniziale<select id="newArtUser"><option value="">Nessuno</option>${activeUsers().map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('')}</select></label><label>&nbsp;<button class="primary" onclick="createArticle()">Crea articolo</button></label></div></div><div class="panel"><table><thead><tr><th>Articolo</th><th>Seriale/Codice</th><th>Sede</th><th>Stato</th><th>Possessore</th><th>Azioni</th></tr></thead><tbody>${db.articles.filter(a=>a.active).map(a=>`<tr><td data-label="Articolo"><strong>${esc(a.name)}</strong><div class="muted small">${esc(a.category||'-')}</div></td><td data-label="Seriale/Codice">${esc(a.serial||a.internalCode||'-')}</td><td data-label="Sede">${esc(getLocationName(a.locationId))}</td><td data-label="Stato">${statePill(a)}</td><td data-label="Possessore">${esc(a.currentHolderUserId?getUserName(a.currentHolderUserId):'Home')}</td><td data-label="Azioni" class="actions"><button onclick="openHistory('${a.id}')">Storico</button><button class="danger" onclick="deactivateArticle('${a.id}')">Disattiva</button></td></tr>`).join('')}</tbody></table></div>` }
async function createArticle(){ const name=$('#newArtName').value.trim(), category=$('#newArtCategory').value.trim(), internalCode=$('#newArtCode').value.trim(), serial=$('#newArtSerial').value.trim(), locationId=$('#newArtLoc').value, state=$('#newArtState').value, userId=$('#newArtUser').value||null; if(!name){ showAlert('error','Inserisci il nome articolo.'); render(); return; } if(state==='in_carico'&&!userId){ showAlert('error','Se lo stato è in carico seleziona un possessore.'); render(); return; } db.articles.push({id:uid('a'),name,category,internalCode,serial,active:true,locationId,state,currentHolderUserId:state==='in_carico'?userId:null,lastKnownUserId:state==='in_carico'?userId:null,lastMovementAt:null,lastNote:'',createdAt:nowIso()}); await saveJsonFile(); render() }
async function deactivateArticle(id){ if(!confirmDelete("l'articolo selezionato")) return; db.articles.find(a=>a.id===id).active=false; await saveJsonFile(); render() }

function renderAdminLogs(){ return `<div class="panel">${renderTopbar('Storico globale','Tutti i movimenti registrati')}<table><thead><tr><th>Data</th><th>Tipo</th><th>Articolo</th><th>Seriale</th><th>Da sede</th><th>A sede</th><th>Da user</th><th>A user</th><th>Registrato da</th><th>Nota</th></tr></thead><tbody>${db.movements.map(m=>`<tr><td data-label="Data">${formatDate(m.timestamp)}</td><td data-label="Tipo">${esc(m.movementType)}</td><td data-label="Articolo">${esc(m.articleName)}</td><td data-label="Seriale">${esc(m.articleSerial||'-')}</td><td data-label="Da sede">${esc(getLocationName(m.fromLocationId))}</td><td data-label="A sede">${esc(getLocationName(m.toLocationId))}</td><td data-label="Da user">${esc(m.fromUserId?getUserName(m.fromUserId):'Home')}</td><td data-label="A user">${esc(m.toUserId?getUserName(m.toUserId):'Home')}</td><td data-label="Registrato da">${esc(getUserName(m.recordedByUserId))}</td><td data-label="Nota">${esc(m.note||'-')}</td></tr>`).join('')}</tbody></table></div>` }

window.loadFromGitHub=loadFromGitHub; window.saveJsonFile=saveJsonFile; window.handleImport=handleImport; window.exportDatabase=exportDatabase; window.pinKey=pinKey; window.adminLogin=adminLogin; window.openPinModal=openPinModal; window.userLogin=userLogin; window.selectLocation=selectLocation; window.toggleArticle=toggleArticle; window.openMovementModal=openMovementModal; window.confirmMovement=confirmMovement; window.openHistory=openHistory; window.closeModal=closeModal; window.setAdminView=setAdminView; window.createUser=createUser; window.resetPin=resetPin; window.deactivateUser=deactivateUser; window.reactivateUser=reactivateUser; window.createLocation=createLocation; window.closeLocation=closeLocation; window.reopenLocation=reopenLocation; window.createArticle=createArticle; window.deactivateArticle=deactivateArticle; window.logoutAll=logoutAll;

render();
</script>
</body>
</html>
